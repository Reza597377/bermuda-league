<html lang="fa" dir="rtl">
<head>

  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230a0e14'/><text x='96' y='105' text-anchor='middle' font-size='85' fill='%23f0c060'>🏝️</text></svg>">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0e14;background-image:radial-gradient(ellipse at 20% 20%,rgba(60,120,255,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 60%,rgba(200,60,255,0.12) 0%,transparent 60%),radial-gradient(ellipse at 50% 90%,rgba(30,255,200,0.08) 0%,transparent 50%);min-height:100vh;color:#e0e0e0;display:flex;flex-direction:column;align-items:center;font-size:18px;line-height:1.6}
    ::-webkit-scrollbar{width:8px}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:10px}
    ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#f0c060,#e89750);border-radius:10px}
    .glass{background:rgba(20,24,35,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 40px rgba(255,215,0,0.08)}
    .glass2{background:rgba(30,35,50,0.70);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05)}
    .neon-text{text-shadow:0 0 20px rgba(255,215,0,0.3),0 0 40px rgba(255,215,0,0.1)}
    button{cursor:pointer;border:none;outline:none;transition:all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);font-family:inherit;border-radius:16px;font-size:1.1rem;padding:16px 28px;color:#fff;font-weight:700;letter-spacing:0.5px;position:relative;overflow:hidden;min-height:54px}
    button::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.15) 0%,transparent 70%);opacity:0;transition:opacity .3s}
    button:hover::after{opacity:1}
    button:active{transform:scale(0.94)}
    .btn-green{background:linear-gradient(135deg,#43a86a,#2d8a4e);box-shadow:0 0 28px rgba(67,168,106,0.35)}
    .btn-red{background:linear-gradient(135deg,#d94a4a,#b33030);box-shadow:0 0 28px rgba(217,74,74,0.35)}
    .btn-blue{background:linear-gradient(135deg,#4a90d9,#3068b3);box-shadow:0 0 28px rgba(74,144,217,0.35)}
    .btn-orange{background:linear-gradient(135deg,#e89750,#c87030);box-shadow:0 0 28px rgba(232,151,80,0.35)}
    .btn-purple{background:linear-gradient(135deg,#9b6fd4,#6a40a8);box-shadow:0 0 28px rgba(155,111,212,0.35)}
    .btn-gold{background:linear-gradient(135deg,#f0c060,#c89630);box-shadow:0 0 28px rgba(240,192,96,0.35);color:#1a1a1a}
    .btn-dark{background:linear-gradient(135deg,#4a5a6a,#2a3440);box-shadow:0 0 20px rgba(0,0,0,0.4)}
    .btn-sm{padding:10px 18px;font-size:0.95rem;border-radius:12px;min-height:42px}
    .btn-xs{padding:6px 14px;font-size:0.8rem;border-radius:10px;min-height:34px}
    .top-menu{display:flex;flex-wrap:wrap;gap:14px;padding:18px 24px;justify-content:center;position:sticky;top:0;z-index:100;background:rgba(10,14,20,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.06);width:100%}
    .menu-btn{padding:20px 32px;border-radius:20px;font-weight:700;font-size:1.4rem;letter-spacing:0.5px;min-width:100px;text-align:center;transition:all .2s;border:1px solid transparent;min-height:60px;display:flex;align-items:center;justify-content:center;gap:8px}
    .menu-btn.active{outline:3px solid #fff;outline-offset:4px;box-shadow:0 0 50px rgba(255,255,255,0.15)}
    .notification-badge{background:#e05555;color:#fff;border-radius:50%;padding:2px 12px;font-size:0.85rem;font-weight:700;position:relative;top:-8px;right:-4px;box-shadow:0 0 20px rgba(224,85,85,0.5)}
    input,select,textarea{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 18px;color:#fff;font-family:inherit;font-size:1rem;outline:none;transition:all .2s;width:100%}
    input:focus,select:focus,textarea:focus{border-color:#f0c060;box-shadow:0 0 24px rgba(240,192,96,0.12)}
    .text-muted{color:#888}
    .text-center{text-align:center}
    .flex-wrap{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    .mt-8{margin-top:8px}
    .mb-8{margin-bottom:8px}
    .hidden{display:none !important}
    .badge{display:inline-block;padding:4px 16px;border-radius:30px;font-size:0.85rem;font-weight:700;margin:2px 4px 2px 0}
    .badge-foreign{background:rgba(100,160,220,0.3);color:#8cc8ff}
    .badge-local{background:rgba(100,200,130,0.3);color:#8cf0a0}
    .badge-sale{background:rgba(240,150,50,0.3);color:#f0b860}
    .badge-starter{background:rgba(200,160,60,0.3);color:#f0d080}
    .msg-error{color:#e05555;font-weight:bold;margin-top:8px}
    .main-container{width:100%;max-width:1000px;padding:24px;flex:1}
    .card{padding:28px;margin:16px 0;border-radius:28px}
    .card h2{font-size:2rem;margin-bottom:16px;color:#f0c060;text-shadow:0 0 30px rgba(240,192,96,0.2)}
    .card h3{font-size:1.4rem;margin-bottom:10px;color:#d0d8e0}
    .card h4{font-size:1.1rem;margin:12px 0 8px;color:#b0b8c0}
    .chat-box{max-height:400px;overflow-y:auto;padding:16px;border-radius:16px;background:rgba(0,0,0,0.25)}
    .news-item{padding:14px 18px;margin:10px 0;border-radius:14px;background:rgba(255,255,255,0.03);border-right:4px solid #f0c060;transition:all .2s;position:relative}
    .news-item .sender{font-weight:700;color:#b0c8f0;font-size:1.05rem}
    .news-item .time{font-size:0.8rem;color:#888;margin-right:10px}
    .dots-btn{position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.1);border:none;color:#ccc;border-radius:50%;width:28px;height:28px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;line-height:1}
    .dots-btn:hover{background:rgba(255,255,255,0.2)}
    .dropdown-menu{position:absolute;top:36px;left:8px;background:#1e2332;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:4px 0;z-index:10;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,0.6)}
    .dropdown-menu button{display:block;width:100%;padding:8px 16px;background:transparent;color:#e05555;border:none;text-align:right;font-size:0.9rem;cursor:pointer;min-height:auto;border-radius:0}
    .dropdown-menu button:hover{background:rgba(255,255,255,0.1)}
    .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center}
    .modal{max-width:580px;width:94%;max-height:85vh;overflow-y:auto;padding:30px;border-radius:32px}
    .history-item{padding:14px 18px;margin:8px 0;border-radius:16px;background:rgba(255,255,255,0.03);border-right:4px solid #f0c060;transition:all .2s}
    .history-item .text{font-size:1rem;line-height:1.7}
    .history-item .time{font-size:0.8rem;color:#888;display:block;margin-top:6px}
    @media(max-width:700px){body{font-size:16px}.top-menu{gap:8px;padding:12px 14px}.menu-btn{padding:14px 20px;font-size:1rem;min-width:70px;min-height:48px}.card{padding:18px}.card h2{font-size:1.5rem}button{font-size:1rem;padding:14px 20px;min-height:48px}input,select,textarea{font-size:0.95rem;padding:12px 14px}}
    @media(max-width:480px){.top-menu{gap:5px;padding:8px 6px}.menu-btn{padding:10px 14px;font-size:0.8rem;min-width:55px;min-height:40px;border-radius:14px}}
  </style>
</head>
<body>

  <nav class="top-menu" id="topMenu">
    <button type="button" class="menu-btn btn-green" data-page="team">⚽ تیم</button>
    <button type="button" class="menu-btn btn-orange" data-page="transfer">🔄 نقل</button>
    <button type="button" class="menu-btn btn-blue" data-page="news">📰 اخبار</button>
    <button type="button" class="menu-btn btn-gold" data-page="inbox">📬 صندوق <span class="notification-badge hidden" id="inboxBadge">0</span></button>
    <button type="button" class="menu-btn btn-purple hidden" data-page="agent" id="btnAgent">🎙️ نماینده</button>
    <button type="button" class="menu-btn btn-red hidden" data-page="admin" id="btnAdmin">🔐 مدیریت</button>
    <button type="button" class="menu-btn btn-dark hidden" data-page="seasonSettings" id="btnSeasonSettings">⚙️ تنظیمات سیزن</button>
    <button type="button" class="menu-btn btn-dark hidden" data-page="starters" id="btnStarters">🎯 بازیکنان اولیه</button>
    <button type="button" class="menu-btn btn-dark hidden" data-page="settings" id="btnSettings">⚙️ تنظیمات</button>
    <button type="button" class="menu-btn btn-red" id="btnLogout" style="background:linear-gradient(135deg,#555,#333);">🚪 خروج</button>
  </nav>

  <div class="main-container" id="mainContent"></div>

  <div class="overlay hidden" id="overlay">
    <div class="modal glass" id="modalContent"></div>
  </div>

  <script>
    (function() {
      'use strict';

      // ========== SECURITY: HTML sanitizer ==========
      function escapeHTML(str) {
        if (typeof str !== 'string') return str;
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      const SUPABASE_URL = 'https://hwhqodifuzpdiiuctlsd.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_01Zk5XADP11Kc6DCWAuStA_yxh7XOyQ';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const ADMIN_SOROUSH = 'Reza_Bermuda';

      const STORAGE_KEY = 'bermuda_league_data_final';
      const SYNC_INTERVAL = 1200;
      const MAX_NEWS = 200;
      const MAX_INBOX = 200;
      const MAX_NEG_MSGS = 100;
      const MAX_TRANSFER_HISTORY = 100;
      let broadcastChannel = null;
      try { broadcastChannel = new BroadcastChannel('bermuda_sync'); } catch(e) {}

      const MIN_PLAYERS = 18;
      const MAX_PLAYERS = 32;

      const DEFAULT_DB = {
        users: [],
        teams: [],
        players: [],
        newsPosts: [],
        chatBanned: [],
        chatTempBanned: [],
        requests: [],
        inboxMessages: [],
        appOff: false,
        negotiations: [],
        transferHistory: [],
        playerIdCounter: 1,
        teamIdCounter: 100,
        seasonSettings: { 
          transfersOpen: true, 
          registrationOpen: true,
          premierBudget: 500,
          championshipBudget: 300,
          premierForeign: 8,
          premierLocal: 9,
          championshipForeign: 6,
          championshipLocal: 8
        },
        _lastUpdate: 0
      };

      let DB = null, syncTimer = null, isSaving = false, saveQueue = false;
      let currentUser = null, currentPage = 'login';
      let currentAdminSub = null;
      let localChangePending = false;
      let initialSyncDone = false; // CRITICAL: prevent pushing empty DB over cloud

      function isForeignPlayer(nationality) {
        return nationality !== 'برمودا' && nationality !== 'انگلیس';
      }

      async function saveToCloud() {
        if (!initialSyncDone) return;
        if (!navigator.onLine) return; // بدون اینترنت ذخیره نکن
        
        // **چک کن ابر از ما جدیدتر نباشه**
        try {
          const { data } = await supabase.from('bermuda_data').select('details').eq('id', 1).single();
          if (data && data.details) {
            const cloudUpdate = data.details._lastUpdate || 0;
            if (cloudUpdate > (DB._lastUpdate || 0)) {
              // ابر از ما جدیدتره - ما نباید روش بنویسیم
              console.log('⛔ ابر جدیدتره، ذخیره نکردم');
              return;
            }
          }
        } catch(e) {}

        const now = Date.now();
        DB._lastUpdate = now;
        localChangePending = true;
        try {
          await supabase.from('bermuda_data').upsert({ 
            id: 1, 
            details: DB,
            updated_at: new Date().toISOString()
          });
          setTimeout(() => { localChangePending = false; }, 500);
        } catch(e) {
          localChangePending = false;
        }
      }

      async function loadFromCloud() {
        if (localChangePending) return;
        try {
          const { data } = await supabase.from('bermuda_data').select('details').eq('id', 1).single();
          if (data && data.details) {
            const cloudUpdate = data.details._lastUpdate || 0;
            if (cloudUpdate > (DB._lastUpdate || 0)) {
              const currentUsername = currentUser?.username;
              DB = { ...DEFAULT_DB, ...data.details };
              if (currentUsername) {
                currentUser = DB.users.find(u => u.username === currentUsername) || null;
              }
              if (currentUser && currentPage) renderPage(currentPage);
            }
          }
        } catch(e) {}
      }

      function subscribeToChanges() {
        supabase.channel('bermuda_changes')
          .on('postgres_changes', 
            { event: 'UPDATE', schema: 'public', table: 'bermuda_data' },
            (payload) => {
              if (localChangePending) return;
              if (payload.new && payload.new.details) {
                const cloudUpdate = payload.new.details._lastUpdate || 0;
                if (cloudUpdate > (DB._lastUpdate || 0)) {
                  const currentUsername = currentUser?.username;
                  DB = { ...DEFAULT_DB, ...payload.new.details };
                  if (currentUsername) {
                    currentUser = DB.users.find(u => u.username === currentUsername) || null;
                  }
                  if (currentUser && currentPage) renderPage(currentPage);
                }
              }
            }
          )
          .subscribe();
      }

      function loadDB() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try { 
            DB = { ...DEFAULT_DB, ...JSON.parse(saved) }; 
          } catch(e) { 
            DB = JSON.parse(JSON.stringify(DEFAULT_DB)); 
          }
        } else {
          DB = JSON.parse(JSON.stringify(DEFAULT_DB));
        }
        
        // ** اگه DB فقط ادمین داره (یعنی خالیه)، صبر کن از ابر بخونه **
        if (DB.users.length <= 1 && !DB._lastUpdate) {
          DB._lastUpdate = 0; // این باعث میشه حتماً از ابر بخونه
        }
      }

      function ensureAdminAndDefaults() {
        if (!DB.users.find(u => u.username === 'رضا برمودا')) {
          DB.users.push({ username: 'رضا برمودا', password: 'Ali147', role: 'admin', soroushId: '', banned: false });
        }
        
        if (DB.teams.length === 0) {
          DB.teams.push(
            { id: DB.teamIdCounter++, name: 'منچسترسیتی', league: 'پرمیر لیگ', manager: null, budget: DB.seasonSettings.premierBudget || 500, foreignQuota: DB.seasonSettings.premierForeign || 8, localQuota: DB.seasonSettings.premierLocal || 9 },
            { id: DB.teamIdCounter++, name: 'آرسنال', league: 'پرمیر لیگ', manager: null, budget: DB.seasonSettings.premierBudget || 500, foreignQuota: DB.seasonSettings.premierForeign || 8, localQuota: DB.seasonSettings.premierLocal || 9 },
            { id: DB.teamIdCounter++, name: 'لیورپول', league: 'پرمیر لیگ', manager: null, budget: DB.seasonSettings.premierBudget || 500, foreignQuota: DB.seasonSettings.premierForeign || 8, localQuota: DB.seasonSettings.premierLocal || 9 },
            { id: DB.teamIdCounter++, name: 'چلسی', league: 'پرمیر لیگ', manager: null, budget: DB.seasonSettings.premierBudget || 500, foreignQuota: DB.seasonSettings.premierForeign || 8, localQuota: DB.seasonSettings.premierLocal || 9 }
          );
        }
        
        if (!DB.seasonSettings) {
          DB.seasonSettings = { 
            transfersOpen: true, registrationOpen: true,
            premierBudget: 500, championshipBudget: 300,
            premierForeign: 8, premierLocal: 9,
            championshipForeign: 6, championshipLocal: 8
          };
        }
        if (!DB.chatTempBanned) DB.chatTempBanned = [];
        if (!DB.newsPosts) DB.newsPosts = [];
        if (!DB.requests) DB.requests = [];
        if (!DB.inboxMessages) DB.inboxMessages = [];
        if (!DB.negotiations) DB.negotiations = [];
        if (!DB.transferHistory) DB.transferHistory = [];
        
        while (DB.newsPosts.length > MAX_NEWS) DB.newsPosts.shift();
        while (DB.inboxMessages.length > MAX_INBOX) DB.inboxMessages.shift();
        while (DB.transferHistory.length > MAX_TRANSFER_HISTORY) DB.transferHistory.shift();
        DB.negotiations.forEach(neg => {
          while (neg.messages && neg.messages.length > MAX_NEG_MSGS) neg.messages.shift();
        });
      }

      function saveDB(notify = true) {
        if (isSaving) { saveQueue = true; return; }
        isSaving = true;
        saveQueue = false;
        
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
          saveToCloud();
          if (broadcastChannel && notify) {
            broadcastChannel.postMessage({ type: 'sync', time: DB._lastUpdate });
          }
        } catch(e) {}
        
        isSaving = false;
        if (saveQueue) saveDB(notify);
      }

      if (broadcastChannel) {
        broadcastChannel.onmessage = function(e) {
          if (e.data && e.data.type === 'sync') {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              try {
                const parsed = JSON.parse(saved);
                if (parsed._lastUpdate > (DB._lastUpdate || 0)) {
                  const currentUsername = currentUser?.username;
                  DB = { ...DEFAULT_DB, ...parsed };
                  if (currentUsername) {
                    currentUser = DB.users.find(u => u.username === currentUsername) || null;
                  }
                  if (currentUser) renderPage(currentPage);
                }
              } catch(e) {}
            }
          }
        };
      }

      function startSync() {
        if (syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(async () => {
          await loadFromCloud();
        }, SYNC_INTERVAL);
      }

      function isAdmin() { return currentUser && currentUser.role === 'admin'; }
      function isAgent() { return currentUser && currentUser.role === 'agent'; }
      function isObserver() { return currentUser && currentUser.role === 'observer'; }
      function isStarterManager() { return currentUser && currentUser.role === 'starter_manager'; }
      function isNewsAdmin() { return currentUser && currentUser.role === 'news_admin'; }
      function hasTeam() { return currentUser && DB.teams.some(t => t.manager === currentUser.username); }
      function getUserTeam() { return currentUser ? DB.teams.find(t => t.manager === currentUser.username) || null : null; }
      function getTeamPlayers(teamId) { return DB.players.filter(p => p.teamId === teamId); }

      function addInboxMessage(to, text, type = 'info') {
        DB.inboxMessages.push({ id: Date.now() + Math.random(), to, text, type, read: false, time: new Date().toLocaleString('fa-IR') });
        while (DB.inboxMessages.length > MAX_INBOX) DB.inboxMessages.shift();
        saveDB();
        if (currentUser && currentUser.username === to) updateInboxBadge();
      }

      function addNews(sender, text, isAuto = false) {
        const enhancedText = isAuto ? enhanceNewsText(text) : text;
        DB.newsPosts.push({ id: Date.now() + Math.random(), sender, text: enhancedText, time: new Date().toLocaleString('fa-IR'), auto: isAuto });
        while (DB.newsPosts.length > MAX_NEWS) DB.newsPosts.shift();
        saveDB();
      }

      function pushNegMessage(neg, sender, text) {
        neg.messages.push({ sender, text });
        while (neg.messages.length > MAX_NEG_MSGS) neg.messages.shift();
      }

      function enhanceNewsText(text) {
        const templates = [
          `🚨 فوری: ${text}`,
          `💥 شوک به لیگ: ${text}`,
          `📢 اعلامیه رسمی: ${text}`,
          `🌟 خبر ویژه: ${text}`,
          `🔥 داغ داغ: ${text}`,
          `🏆 در خبری مهم: ${text}`,
          `⚡️ اتفاقی بزرگ: ${text}`
        ];
        return templates[Math.floor(Math.random() * templates.length)];
      }

      function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        Object.assign(toast.style, {
          position: 'fixed', bottom: '30px', left: '50%', transform: 'translateX(-50%)', zIndex: '999',
          maxWidth: '90%', padding: '16px 32px', borderRadius: '40px',
          background: isError ? 'rgba(200,50,50,0.92)' : 'rgba(240,192,96,0.92)',
          color: '#fff', fontWeight: 'bold', fontSize: '1.05rem',
          boxShadow: '0 8px 40px rgba(0,0,0,0.6)', backdropFilter: 'blur(10px)', border: '1px solid rgba(255,255,255,0.1)'
        });
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4500);
      }

      function updateInboxBadge() {
        const badge = document.getElementById('inboxBadge');
        if (!currentUser) { badge.classList.add('hidden'); return; }
        const unread = DB.inboxMessages.filter(m => m.to === currentUser.username && !m.read).length;
        badge.textContent = unread;
        badge.classList.toggle('hidden', unread === 0);
      }

      function updateMenuButtons(activePage) {
        document.querySelectorAll('.menu-btn[data-page]').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.page === activePage);
        });
      }

      function updateRoleButtons() {
        document.getElementById('btnAgent').classList.toggle('hidden', !isAgent());
        document.getElementById('btnAdmin').classList.toggle('hidden', !isAdmin());
        document.getElementById('btnSeasonSettings').classList.toggle('hidden', !isAdmin());

      window._submitSell = function() {
        const playerId = parseInt(document.getElementById('sellPlayer').value);

        const errEl = document.getElementById('sellError');
        if (!playerId || !price || price <= 0) { errEl.innerHTML = '<div class="msg-error">لطفاً بازیکن و قیمت معتبر وارد کنید</div>'; return; }
        const team = getUserTeam();

        const player = DB.players.find(p => p.id === playerId);

        player.forSale = true;
        player.salePrice = price;
        DB.requests.push({
          id: Date.now() + Math.random(),
          type: 'sell_player',

          playerId: player.id,

        renderPage('team');
        showToast('✅ درخواست فروش ارسال شد.');

        container.innerHTML = `
          <div class="card glass">
            <h2>🔄 نقل و انتقالات</h2>
            <div class="flex-wrap">
              ${DB.seasonSettings.transfersOpen ? `<button type="button" class="btn-orange" onclick="window._sendAgentLetter()">📨 ارسال نامه به نماینده</button>` : `<span class="text-muted" style="color:#e05555;">⛔ نقل و انتقالات بسته است</span>`}
              <button type="button" class="btn-blue" onclick="window._openMarket()">🏪 انتقالات لیگ</button>
              <button type="button" class="btn-dark" onclick="window._showHistory()">📋 تاریخچه</button>
            </div>
            <div id="transferSubContent" style="margin-top:18px;"></div>
          </div>
          <div id="tradeRequestsContainer" class="card glass2"></div>
        `;
        document.getElementById('transferSubContent').innerHTML = '<p class="text-muted">یکی از گزینه‌های بالا را انتخاب کنید</p>';
        if (hasTeam()) {
          renderTeamNegotiationBox();
          renderTradeRequests();
        }
      }

      function renderTradeRequests() {
        const container = document.getElementById('tradeRequestsContainer');
        if (!container) return;
        const team = getUserTeam();
        if (!team) return;
        const pendingTrades = DB.requests.filter(r => r.type === 'trade_offer' && r.toUser === currentUser.username && r.status === 'pending_target');
        if (pendingTrades.length === 0) {
          container.innerHTML = `<p class="text-muted">هیچ درخواست معاوضه‌ای برای شما وجود ندارد</p>`;
          return;
        }
        let html = `<h3>📨 درخواست‌های معاوضه برای شما</h3>`;
        pendingTrades.forEach(r => {
          html += `
            <div class="glass2" style="padding:14px;margin:8px 0;border-radius:16px;border-right:3px solid #ff9800;">
              <div><strong>از تیم:</strong> ${escapeHTML(r.fromTeamName || r.fromUser || 'نامشخص')}</div>
              <div><strong>بازیکن شما:</strong> ${escapeHTML(r.targetPlayerName || 'نامشخص')}</div>
              <div><strong>در ازای:</strong> ${escapeHTML(r.myPlayerName || 'نامشخص')}</div>
              ${r.cash > 0 ? `<div><strong>💰 نقدی:</strong> ${r.cash}M</div>` : ''}
              <div class="text-muted" style="font-size:0.8rem;">🕐 ${r.time}</div>
              <div style="margin-top:10px;display:flex;gap:8px;">
                <button type="button" class="btn-green btn-sm" onclick="window._respondTrade(${r.id}, true)">✅ قبول</button>
                <button type="button" class="btn-red btn-sm" onclick="window._respondTrade(${r.id}, false)">❌ رد</button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      window._respondTrade = function(requestId, accept) {
        const req = DB.requests.find(r => r.id === requestId);
        if (!req) { showToast('درخواست پیدا نشد!', true); return; }
        if (req.status !== 'pending_target') { showToast('این درخواست قبلاً پاسخ داده شده!', true); return; }
        if (accept) {
          req.status = 'pending_admin';
          addInboxMessage('رضا برمودا', `🔄 درخواست معاوضه: ${req.fromUser} و ${req.toUser} به توافق رسیدند. لطفاً تایید نهایی را انجام دهید.`);
          addInboxMessage(req.fromUser, `✅ تیم ${req.toUser} با معاوضه موافقت کرد. در انتظار تایید مدیرکل...`);
          showToast('✅ شما با معاوضه موافقت کردید. درخواست به مدیرکل ارسال شد.');
        } else {
          req.status = 'rejected';
          addInboxMessage(req.fromUser, `❌ تیم ${req.toUser} درخواست معاوضه را رد کرد.`);
          showToast('❌ درخواست معاوضه رد شد.');
        }
        saveDB();
        renderPage('transfer');
      };

      function renderTeamNegotiationBox() {
        const sub = document.getElementById('transferSubContent');
        if (!sub) return;
        const activeNeg = DB.negotiations.find(n => n.teamUsername === currentUser?.username && n.status === 'active');
        if (activeNeg) {
          sub.innerHTML += `
            <div class="glass2" style="padding:16px;margin-top:12px;border-radius:16px;border-right:4px solid #f0c060;">
              <h4>💬 مذاکره فعال با نماینده ${escapeHTML(activeNeg.agentUsername)}</h4>
              <p>بازیکن: <strong>${escapeHTML(activeNeg.playerName)}</strong> (${escapeHTML(activeNeg.nationality)})</p>
              <div style="display:flex;gap:10px;">
                <button type="button" class="btn-blue btn-sm" onclick="window._openTeamNegChat('${activeNeg.id}')">🗨️ ورود به مذاکره</button>
                <button type="button" class="btn-red btn-sm" onclick="window._cancelNegotiation('${activeNeg.id}')">🚫 لغو مذاکره</button>
              </div>
            </div>
          `;
        }
      }

      // ========== NEGOTIATION CHAT ==========
      window._openTeamNegChat = function(negId) {
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        const team = getUserTeam();
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modalContent');
        modal.innerHTML = `
          <h3>💬 مذاکره: ${escapeHTML(neg.playerName)} (${escapeHTML(neg.nationality)}) | 💰 بودجه تیم: <span style="color:#f0c060;">${team?.budget || '?'}M</span></h3>
          <div class="chat-box glass2" id="teamNegChatBox" style="min-height:180px;max-height:300px;">
            ${neg.messages.map((m, i) => `
              <div class="news-item">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <strong>${escapeHTML(m.sender)}:</strong>
                  <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${i}, 'teamNegChatBox')">⋯</button>
                </div>
                <div>${escapeHTML(m.text)}</div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
            <input type="text" id="teamNegChatInput" placeholder="پیام چت..." style="flex:2;min-width:160px;">
            <button type="button" class="btn-blue btn-sm" onclick="window._sendTeamNegChat('${neg.id}')">📨 ارسال</button>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;">
            <input type="number" id="teamNegPrice" placeholder="قیمت (M)" style="flex:1;">
            <input type="number" id="teamNegDuration" placeholder="مدت (فصل)" style="flex:1;">
            <button type="button" class="btn-purple btn-sm" onclick="window._sendTeamNegProposal('${neg.id}')">📩 ارسال پیشنهاد</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button type="button" class="btn-green" onclick="window._approveTeamNeg('${neg.id}')">✅ موافقت نهایی</button>
            <button type="button" class="btn-red" onclick="window._cancelNegotiation('${neg.id}')">🚫 لغو مذاکره</button>
            <button type="button" class="btn-dark" onclick="window._closeOverlay()">بستن</button>
          </div>
          <div id="teamNegError"></div>`;
        overlay.classList.remove('hidden');
        const chatBox = document.getElementById('teamNegChatBox');
        if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
      };

      window._deleteChatMsg = function(negId, msgIndex, chatBoxId) {
        if (!confirm('آیا از حذف این پیام مطمئن هستید؟')) return;
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg || !neg.messages[msgIndex]) return;
        neg.messages.splice(msgIndex, 1);
        saveDB();
        const chatBox = document.getElementById(chatBoxId);
        if (chatBox) {
          chatBox.innerHTML = neg.messages.map((m, i) => `
            <div class="news-item">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <strong>${escapeHTML(m.sender)}:</strong>
                <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${i}, '${chatBoxId}')">⋯</button>
              </div>
              <div>${escapeHTML(m.text)}</div>
            </div>
          `).join('');
        }
        showToast('✅ پیام حذف شد.');
      };

      window._sendTeamNegChat = function(negId) {
        const input = document.getElementById('teamNegChatInput');
        const text = input.value.trim();
        if (!text) return;
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        pushNegMessage(neg, currentUser.username, text);
        saveDB();
        const chatBox = document.getElementById('teamNegChatBox');
        if (chatBox) {
          const msgIndex = neg.messages.length - 1;
          const msgDiv = document.createElement('div');
          msgDiv.className = 'news-item';
          msgDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <strong>${escapeHTML(currentUser.username)}:</strong>
              <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${msgIndex}, 'teamNegChatBox')">⋯</button>
            </div>
            <div>${escapeHTML(text)}</div>`;
          chatBox.appendChild(msgDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
        input.value = '';
      };

      window._sendTeamNegProposal = function(negId) {
        const price = parseInt(document.getElementById('teamNegPrice').value);
        const duration = parseInt(document.getElementById('teamNegDuration').value);
        const errEl = document.getElementById('teamNegError');
        if (!price || !duration || price <= 0 || duration <= 0) {
          errEl.innerHTML = '<div class="msg-error">قیمت و مدت معتبر وارد کنید</div>';
          return;
        }
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        neg.price = price;
        neg.duration = duration;
        pushNegMessage(neg, currentUser.username, `💎 پیشنهاد: ${price}M به مدت ${duration} فصل`);
        saveDB();
        const chatBox = document.getElementById('teamNegChatBox');
        if (chatBox) {
          const msgIndex = neg.messages.length - 1;
          const msgDiv = document.createElement('div');
          msgDiv.className = 'news-item';
          msgDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <strong>${escapeHTML(currentUser.username)}:</strong>
              <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${msgIndex}, 'teamNegChatBox')">⋯</button>
            </div>
            <div>💎 پیشنهاد: ${price}M به مدت ${duration} فصل</div>`;
          chatBox.appendChild(msgDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
        showToast('✅ پیشنهاد ارسال شد.');
      };

      window._approveTeamNeg = function(negId) {
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        if (neg.status === 'final') { showToast('این قرارداد قبلاً نهایی شده است.', true); return; }
        if (currentUser.username === neg.teamUsername) neg.teamApproved = true;
        if (neg.agentApproved && neg.teamApproved) {
          neg.status = 'final';
          DB.requests.push({
            id: Date.now() + Math.random(),
            type: 'final_contract',
            negId: neg.id,
            playerName: neg.playerName,
            nationality: neg.nationality,
            position: neg.position,
            teamUsername: neg.teamUsername,
            agentUsername: neg.agentUsername,
            price: neg.price,
            duration: neg.duration,
            status: 'pending',
            time: new Date().toLocaleString('fa-IR')
          });
          addInboxMessage('رضا برمودا', `📝 قرارداد نهایی: ${neg.playerName} بین ${neg.teamUsername} و نماینده ${neg.agentUsername} آماده تایید نهایی است. (${neg.price}M - ${neg.duration} فصل)`);
          showToast('✅ هر دو طرف موافقت کردند! قرارداد به مدیرکل ارسال شد.');
        } else {
          showToast('✅ موافقت شما ثبت شد. منتظر موافقت نماینده باشید.');
        }
        saveDB();
        window._closeOverlay();
        renderPage('transfer');
      };

      window._cancelNegotiation = function(negId) {
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        if (!confirm('آیا از لغو کامل این مذاکره اطمینان دارید؟')) return;
        addInboxMessage(neg.teamUsername, `🚫 مذاکره برای بازیکن ${neg.playerName} توسط ${currentUser.username} لغو شد.`);
        addInboxMessage(neg.agentUsername, `🚫 مذاکره برای بازیکن ${neg.playerName} توسط ${currentUser.username} لغو شد.`);
        DB.negotiations = DB.negotiations.filter(n => n.id != negId);
        const originalReq = DB.requests.find(r => r.type === 'agent_request' && r.fromUser === neg.teamUsername && r.status === 'accepted');
        if (originalReq) originalReq.status = 'cancelled';
        saveDB();
        window._closeOverlay();
        if (currentPage === 'transfer') renderPage('transfer');
        else renderPage('agent');
        showToast('🚫 مذاکره لغو شد.');
      };

      window._sendAgentLetter = function() {
        if (!DB.seasonSettings.transfersOpen) { showToast('نقل و انتقالات بسته است.', true); return; }
        const agents = DB.users.filter(u => u.role === 'agent');
        if (agents.length === 0) { showToast('هیچ نماینده‌ای وجود ندارد.', true); return; }
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modalContent');
        modal.innerHTML = `
          <h3>📨 ارسال درخواست مذاکره</h3>
          <p style="color:#aaa;font-size:0.9rem;">لطفاً اطلاعات بازیکن مورد نظر خود را وارد کنید. درخواست شما برای نمایندگان ارسال خواهد شد.</p>
          <input type="text" id="letterPlayerName" placeholder="نام بازیکن" style="margin:10px 0;">
          <input type="text" id="letterPlayerPos" placeholder="پست بازیکن" style="margin:10px 0;">
          <input type="text" id="letterPlayerNat" placeholder="ملیت" style="margin:10px 0;">
          <textarea id="letterText" placeholder="متن نامه..." style="margin:10px 0;min-height:80px;"></textarea>
          <div id="letterError"></div>
          <button type="button" class="btn-orange" onclick="window._submitLetter()">📩 ارسال</button>
          <button type="button" class="btn-dark" onclick="window._closeOverlay()" style="margin-top:8px;">بستن</button>`;
        overlay.classList.remove('hidden');
      };
      window._submitLetter = function() {
        const playerName = document.getElementById('letterPlayerName').value.trim();
        const position = document.getElementById('letterPlayerPos').value.trim();
        const nationality = document.getElementById('letterPlayerNat').value.trim();
        const text = document.getElementById('letterText').value.trim();
        const errEl = document.getElementById('letterError');
        if (!playerName || !position || !nationality) { errEl.innerHTML = '<div class="msg-error">لطفاً اطلاعات بازیکن را کامل وارد کنید</div>'; return; }
        DB.requests.push({
          id: Date.now() + Math.random(),
          type: 'agent_request',
          fromUser: currentUser.username,
          playerName, position, nationality, text,
          status: 'pending',
          time: new Date().toLocaleString('fa-IR')
        });
        const agents = DB.users.filter(u => u.role === 'agent');
        agents.forEach(agent => {
          addInboxMessage(agent.username, `📨 درخواست مذاکره جدید از ${currentUser.username} برای بازیکن ${playerName}`);
        });
        saveDB();
        window._closeOverlay();
        showToast('✅ درخواست شما در صف قرار گرفت.');
      };

      window._openMarket = function() {
        const sub = document.getElementById('transferSubContent');
        const forSalePlayers = DB.players.filter(p => p.forSale && DB.requests.some(r => r.type === 'sell_player' && r.playerId === p.id && r.status === 'approved'));
        if (forSalePlayers.length === 0) {
          sub.innerHTML = '<p class="text-muted">هیچ بازیکنی در انتقالات لیگ موجود نیست</p>';
          return;
        }
        const myTeam = getUserTeam();
        sub.innerHTML = `<h3>🏪 انتقالات لیگ</h3>` + forSalePlayers.map(p => {
          const team = DB.teams.find(t => t.id === p.teamId);
          const isOwner = myTeam && myTeam.id === p.teamId;
          return `<div class="glass2" style="padding:14px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-radius:16px;">
            <span><strong>${escapeHTML(p.name)}</strong> (${escapeHTML(p.position)}) - قیمت: ${p.salePrice}M - تیم: ${team?.name||'نامشخص'}</span>
            ${!isOwner ? (DB.seasonSettings.transfersOpen ? `<button type="button" class="btn-blue btn-sm" onclick="window._buyFromMarket(${p.id})">خرید</button>` : `<span class="text-muted" style="color:#e05555;">⛔ بسته</span>`) : '<span class="text-muted">بازیکن خودتان</span>'}
          </div>`;
        }).join('');
      };
      window._buyFromMarket = function(playerId) {
        if (!DB.seasonSettings.transfersOpen) { showToast('نقل و انتقالات بسته است.', true); return; }
        const player = DB.players.find(p => p.id === playerId);
        if (!player) return;
        const team = getUserTeam();
        if (!team) { showToast('شما تیم ندارید!', true); return; }
        if (team.budget < player.salePrice) { showToast('بودجه کافی نیست!', true); return; }
        const isForeign = isForeignPlayer(player.nationality);
        if (isForeign && team.foreignQuota <= 0) { showToast('سهمیه خارجی تیم پر است!', true); return; }
        if (!isForeign && team.localQuota <= 0) { showToast('سهمیه داخلی تیم پر است!', true); return; }
        const currentPlayers = getTeamPlayers(team.id);
        if (currentPlayers.length >= MAX_PLAYERS) { showToast(`حداکثر تعداد بازیکنان ${MAX_PLAYERS} است، نمی‌توانید بازیکن جدید بخرید.`, true); return; }
        DB.requests.push({
          id: Date.now() + Math.random(),
          type: 'market_buy',
          username: currentUser.username,
          playerId,
          playerName: player.name,
          price: player.salePrice,
          teamId: team.id,
          status: 'pending',
          time: new Date().toLocaleString('fa-IR')
        });
        addInboxMessage('رضا برمودا', `🏪 درخواست خرید از انتقالات لیگ: ${currentUser.username} می‌خواهد ${player.name} را به قیمت ${player.salePrice}M بخرد.`);
        saveDB();
        showToast('✅ درخواست خرید به مدیرکل ارسال شد.');
      };

      window._showHistory = function() {
        const sub = document.getElementById('transferSubContent');
        const filtered = DB.transferHistory.filter(h => h.type === 'buy' || h.type === 'trade' || h.type === 'negotiation');
        if (filtered.length === 0) {
          sub.innerHTML = '<p class="text-muted">تاریخچه‌ای وجود ندارد</p>';
          return;
        }
        let html = `<h3>📋 تاریخچه نقل و انتقالات</h3>`;
        filtered.slice(-30).reverse().forEach(h => {
          let content = '';
          if (h.type === 'buy') {
            content = `🏪 انتقالات لیگ<br>${escapeHTML(h.data.player)} ☜ ${escapeHTML(h.data.buyer)}<br>از تیم: ${escapeHTML(h.data.seller)} — ${h.data.price}M`;
          } else if (h.type === 'trade') {
            content = `🔄 معاوضه<br>${escapeHTML(h.data.player1)} ☜ ${escapeHTML(h.data.to)}<br>${escapeHTML(h.data.player2)} ☜ ${escapeHTML(h.data.from)}<br>💰 نقدی: ${h.data.cash}M`;
          } else if (h.type === 'negotiation') {
            content = `📝 قرارداد جدید<br>${escapeHTML(h.data.player)} طی قراردادی به مبلغ ${h.data.price}M به مدت ${h.data.duration} فصل به ${escapeHTML(h.data.team)} پیوست.`;
          }
          html += `
            <div class="history-item">
              <div class="text">${content}</div>
              <div class="time">🕐 ${h.time}</div>
            </div>
          `;
        });
        sub.innerHTML = html;
      };

      // ========== NEWS PAGE ==========
      function renderNewsPage() {
        const container = document.getElementById('mainContent');
        const canPost = isAdmin() || isObserver() || isNewsAdmin();
        container.innerHTML = `
          <div class="card glass">
            <h2>📰 اخبار لیگ</h2>
            <div class="chat-box glass2" id="newsBox" style="min-height:240px;"></div>
            ${canPost ? `
            <div style="display:flex;gap:10px;margin-top:10px;">
              <input type="text" id="newsInput" placeholder="خبر جدید...">
              <button type="button" class="btn-blue" onclick="window._sendNews()">📨 ارسال</button>
            </div>` : ''}
          </div>`;
        renderNewsPosts();
      }

      function renderNewsPosts() {
        const box = document.getElementById('newsBox');
        if (!box) return;
        const canDelete = isAdmin() || isObserver() || isNewsAdmin();
        box.innerHTML = DB.newsPosts.slice(-50).reverse().map(p => `
          <div class="news-item">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div><span class="sender">${p.auto ? '🤖 سیستم' : escapeHTML(p.sender)}</span><span class="time">${p.time}</span></div>
              ${canDelete ? `<button class="dots-btn" onclick="window._deleteNews('${p.id}')">⋯</button>` : ''}
            </div>
            <div style="margin-top:4px;">${escapeHTML(p.text)}</div>
          </div>
        `).join('');
      }

      window._sendNews = function() {
        if (!isAdmin() && !isObserver() && !isNewsAdmin()) { showToast('شما اجازه ارسال خبر ندارید.', true); return; }
        const input = document.getElementById('newsInput');
        const text = input.value.trim();
        if (!text) return;
        addNews(currentUser.username, text, false);
        input.value = '';
        renderNewsPosts();
      };

      window._deleteNews = function(id) {
        if (!isAdmin() && !isObserver() && !isNewsAdmin()) { showToast('شما اجازه حذف خبر ندارید.', true); return; }
        DB.newsPosts = DB.newsPosts.filter(p => p.id != id);
        saveDB();
        renderNewsPosts();
        if (currentPage === 'news') renderNewsPage();
        else if (currentAdminSub === 'newsMgmt') renderAdminSubPage('newsMgmt');
      };

      // ========== INBOX ==========
      function renderInboxPage() {
        const container = document.getElementById('mainContent');
        const messages = DB.inboxMessages.filter(m => m.to === currentUser.username).reverse();
        messages.forEach(m => { if (!m.read) { m.read = true; } });
        saveDB();
        updateInboxBadge();
        container.innerHTML = `
          <div class="card glass">
            <h2>📬 صندوق پیام</h2>
            ${messages.length===0 ? '<p class="text-muted">پیامی وجود ندارد</p>' : ''}
            ${messages.map(m => `

        container.innerHTML = `

                  <button type="button" class="btn-red btn-sm" onclick="window._cancelNegotiation(${n.id})">🚫 لغو مذاکره</button>
                </div>
              </div>
            `).join('') || '<p class="text-muted">مذاکره فعالی نیست</p>'}
          </div>`;
      }

      window._acceptAgentRequest = function(reqId) {
        const active = DB.negotiations.find(n => n.agentUsername === currentUser.username && n.status === 'active');
        if (active) { showToast('شما یک مذاکره فعال دارید. ابتدا آن را تمام یا لغو کنید.', true); return; }
        const req = DB.requests.find(r => r.id === reqId);
        if (!req || req.status !== 'pending') { showToast('درخواست دیگر معتبر نیست.', true); return; }
        req.status = 'accepted';
        const neg = {
          id: Date.now() + Math.random(),
          agentUsername: currentUser.username,
          teamUsername: req.fromUser,
          playerName: req.playerName,
          position: req.position,
          nationality: req.nationality,
          status: 'active',
          messages: [],
          agentApproved: false,
          teamApproved: false,
          price: 0,
          duration: 0
        };
        DB.negotiations.push(neg);
        addInboxMessage(req.fromUser, `✅ نماینده ${currentUser.username} درخواست شما را قبول کرد. مذاکره شروع شد. لطفاً به بخش نقل و انتقالات بروید.`);
        saveDB();
        renderPage('agent');
        showToast('✅ مذاکره شروع شد.');
      };

      window._openAgentNegChat = function(negId) {
        const neg = DB.negotiations.find(n => n.id === negId);
        if (!neg) return;
        const team = DB.teams.find(t => t.manager === neg.teamUsername);
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modalContent');
        modal.innerHTML = `
          <h3>💬 مذاکره: ${escapeHTML(neg.playerName)} (${escapeHTML(neg.nationality)}) | 💰 بودجه تیم: <span style="color:#f0c060;">${team?.budget || '?'}M</span></h3>
          <div class="chat-box glass2" id="agentNegChatBox" style="min-height:180px;max-height:300px;">
            ${neg.messages.map((m, i) => `
              <div class="news-item">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <strong>${escapeHTML(m.sender)}:</strong>
                  <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${i}, 'agentNegChatBox')">⋯</button>
                </div>
                <div>${escapeHTML(m.text)}</div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
            <input type="text" id="agentNegChatInput" placeholder="پیام چت..." style="flex:2;min-width:160px;">
            <button type="button" class="btn-blue btn-sm" onclick="window._sendAgentNegChat('${neg.id}')">📨 ارسال</button>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;">
            <input type="number" id="agentNegPrice" placeholder="قیمت (M)" style="flex:1;">
            <input type="number" id="agentNegDuration" placeholder="مدت (فصل)" style="flex:1;">
            <button type="button" class="btn-purple btn-sm" onclick="window._sendAgentNegProposal('${neg.id}')">📩 ارسال پیشنهاد</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button type="button" class="btn-green" onclick="window._approveAgentNeg('${neg.id}')">✅ موافقت نهایی</button>
            <button type="button" class="btn-red" onclick="window._cancelNegotiation('${neg.id}')">🚫 لغو مذاکره</button>
            <button type="button" class="btn-dark" onclick="window._closeOverlay()">بستن</button>
          </div>
          <div id="agentNegError"></div>`;
        overlay.classList.remove('hidden');
        const chatBox = document.getElementById('agentNegChatBox');
        if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
      };

      window._sendAgentNegChat = function(negId) {
        const input = document.getElementById('agentNegChatInput');
        const text = input.value.trim();
        if (!text) return;
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        pushNegMessage(neg, currentUser.username, text);
        saveDB();
        const chatBox = document.getElementById('agentNegChatBox');
        if (chatBox) {
          const msgIndex = neg.messages.length - 1;
          const msgDiv = document.createElement('div');
          msgDiv.className = 'news-item';
          msgDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <strong>${escapeHTML(currentUser.username)}:</strong>
              <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${msgIndex}, 'agentNegChatBox')">⋯</button>
            </div>
            <div>${escapeHTML(text)}</div>`;
          chatBox.appendChild(msgDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
        input.value = '';
      };

      window._sendAgentNegProposal = function(negId) {
        const price = parseInt(document.getElementById('agentNegPrice').value);
        const duration = parseInt(document.getElementById('agentNegDuration').value);
        const errEl = document.getElementById('agentNegError');
        if (!price || !duration || price <= 0 || duration <= 0) {
          errEl.innerHTML = '<div class="msg-error">قیمت و مدت معتبر وارد کنید</div>';
          return;
        }
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        neg.price = price;
        neg.duration = duration;
        pushNegMessage(neg, currentUser.username, `💎 پیشنهاد: ${price}M به مدت ${duration} فصل`);
        saveDB();
        const chatBox = document.getElementById('agentNegChatBox');
        if (chatBox) {
          const msgIndex = neg.messages.length - 1;
          const msgDiv = document.createElement('div');
          msgDiv.className = 'news-item';
          msgDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <strong>${escapeHTML(currentUser.username)}:</strong>
              <button class="dots-btn" onclick="window._deleteChatMsg('${neg.id}', ${msgIndex}, 'agentNegChatBox')">⋯</button>
            </div>
            <div>💎 پیشنهاد: ${price}M به مدت ${duration} فصل</div>`;
          chatBox.appendChild(msgDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
        showToast('✅ پیشنهاد ارسال شد.');
      };

      window._approveAgentNeg = function(negId) {
        const neg = DB.negotiations.find(n => n.id == negId);
        if (!neg) return;
        if (neg.status === 'final') { showToast('این قرارداد قبلاً نهایی شده است.', true); return; }
        if (currentUser.username === neg.agentUsername) neg.agentApproved = true;
        if (neg.agentApproved && neg.teamApproved) {
          neg.status = 'final';
          DB.requests.push({
            id: Date.now() + Math.random(),
            type: 'final_contract',
            negId: neg.id,
            playerName: neg.playerName,
            nationality: neg.nationality,
            position: neg.position,
            teamUsername: neg.teamUsername,
            agentUsername: neg.agentUsername,
            price: neg.price,
            duration: neg.duration,
            status: 'pending',
            time: new Date().toLocaleString('fa-IR')
          });
          addInboxMessage('رضا برمودا', `📝 قرارداد نهایی: ${neg.playerName} بین ${neg.teamUsername} و نماینده ${neg.agentUsername} آماده تایید نهایی است. (${neg.price}M - ${neg.duration} فصل)`);
          showToast('✅ هر دو طرف موافقت کردند! قرارداد به مدیرکل ارسال شد.');
        } else {
          showToast('✅ موافقت شما ثبت شد. منتظر موافقت تیم باشید.');
        }
        saveDB();
        window._closeOverlay();
        renderPage('agent');
      };

                  <div class="glass2" style="padding:12px 16px;margin:6px 0;border-radius:14px;">
