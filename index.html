                    <div class="text-muted" style="font-size:0.8rem;">🕐 ${r.time}</div>
                    <div style="margin-top:8px;display:flex;gap:8px;">
                      <button type="button" class="btn-sm btn-green" onclick="window._approveRequest(${r.id})">✅ تایید</button>
                      <button type="button" class="btn-sm btn-red" onclick="window._rejectRequest(${r.id})">❌ رد</button>
                    </div>
                  </div>
                `;
              });
            }
            if (tradeReqs.length === 0 && otherReqs.length === 0) html += '<p class="text-muted">درخواستی نیست</p>';
            el.innerHTML = html;
            break;
          }
          case 'newsMgmt': {
            const news = DB.newsPosts.slice(-50).reverse();
            el.innerHTML = `
              <h3>📰 مدیریت اخبار (حذف)</h3>
              <div style="max-height:400px;overflow-y:auto;">
                ${news.length ? news.map(p => `
                  <div class="news-item">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                      <div><span class="sender">${p.auto ? '🤖 سیستم' : escapeHTML(p.sender)}</span><span class="time">${p.time}</span></div>
                      <button class="dots-btn" onclick="window._deleteNews('${p.id}')">⋯</button>
                    </div>
                    <div>${escapeHTML(p.text)}</div>
                  </div>
                `).join('') : '<p class="text-muted">خبری وجود ندارد</p>'}
              </div>
            `;
            break;
          }
          case 'adminsMgmt': {
            const users = DB.users.filter(u => u.username !== 'رضا برمودا');
            el.innerHTML = `
              <h3>👤 مدیریت ادمین‌ها</h3>
              <p style="color:#aaa;font-size:0.9rem;">نقش‌های ویژه: ناظر، نماینده، مدیر بازیکنان اولیه، ادمین اخبار</p>
              ${users.map(u => `
                <div class="glass2" style="padding:12px 16px;margin:8px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;border-radius:14px;">
                  <span><strong>${escapeHTML(u.username)}</strong> (نقش فعلی: ${escapeHTML(u.role)})</span>
                  <div style="display:flex;gap:6px;">
                    <select id="role_${escapeHTML(u.username)}" style="width:auto;min-width:130px;">
                      <option value="user" ${u.role==='user'?'selected':''}>کاربر عادی</option>
                      <option value="observer" ${u.role==='observer'?'selected':''}>ناظر</option>
                      <option value="agent" ${u.role==='agent'?'selected':''}>نماینده</option>
                      <option value="starter_manager" ${u.role==='starter_manager'?'selected':''}>مدیر بازیکنان اولیه</option>
                      <option value="news_admin" ${u.role==='news_admin'?'selected':''}>ادمین اخبار</option>
                    </select>
                    <button type="button" class="btn-sm btn-blue" onclick="window._setUserRole('${escapeHTML(u.username)}')">اعمال</button>
                  </div>
                </div>
              `).join('')}
            `;
            break;
          }
          case 'broadcast': {
            el.innerHTML = `
              <h3>📢 پیام همگانی</h3>
              <textarea id="broadcastText" placeholder="متن پیام..." style="min-height:80px;"></textarea>
              <button type="button" class="btn-blue btn-sm" onclick="window._broadcast()" style="margin-top:8px;">📨 ارسال به همه</button>
              <button type="button" class="btn-blue btn-sm" onclick="window._adminSub('stats')">📊 آمار</button>
            `;
            break;
          }
          case 'stats': {
  const totalUsers = DB.users.length;
  const totalTeams = DB.teams.length;
  const filledTeams = DB.teams.filter(t => t.manager).length;
  const emptyTeams = totalTeams - filledTeams;
  const totalTransfers = DB.transferHistory.length;
  const buys = DB.transferHistory.filter(h => h.type === 'buy').length;
  const trades = DB.transferHistory.filter(h => h.type === 'trade').length;
  const negotiations = DB.transferHistory.filter(h => h.type === 'negotiation').length;
  const totalNews = DB.newsPosts.length;
  const totalInbox = DB.inboxMessages.length;

  el.innerHTML = `
    <h3>📊 آمار لیگ برمودا</h3>
    <div class="glass2" style="padding:20px; border-radius:16px;">
      <h4>👥 کاربران و تیم‌ها</h4>
      <p>👤 تعداد کاربران: <strong>${totalUsers}</strong> نفر</p>
      <p>🏆 تعداد تیم‌ها: <strong>${totalTeams}</strong> تیم</p>
      <p>✅ تیم‌های دارای مربی: <strong>${filledTeams}</strong> تیم</p>
      <p>📋 تیم‌های خالی: <strong>${emptyTeams}</strong> تیم</p>
    </div>
    <div class="glass2" style="padding:20px; border-radius:16px; margin-top:12px;">
      <h4>🔄 نقل و انتقالات</h4>
      <p>کل نقل و انتقالات: <strong>${totalTransfers}</strong> مورد</p>
      <p>• خرید از بازار: <strong>${buys}</strong></p>
      <p>• معاوضه: <strong>${trades}</strong></p>
      <p>• قرارداد با نماینده: <strong>${negotiations}</strong></p>
    </div>
    <div class="glass2" style="padding:20px; border-radius:16px; margin-top:12px;">
      <h4>📰 محتوا</h4>
      <p>اخبار منتشرشده: <strong>${totalNews}</strong> خبر</p>
      <p>پیام‌های صندوق: <strong>${totalInbox}</strong> پیام</p>
    </div>
  `;
  break;
}
        }
      }

      window._adminSub = function(sub) { renderAdminSubPage(sub); };
      window._setUserRole = function(username) {
        const select = document.getElementById('role_' + username);
        if (!select) return;
        const newRole = select.value;
        const user = DB.users.find(u => u.username === username);
        if (user && user.role !== 'admin') {
          user.role = newRole;
          saveDB();
          showToast(`✅ نقش ${username} به ${newRole} تغییر یافت.`);
          renderAdminSubPage('adminsMgmt');
        }
      };

      // ========== APPROVE / REJECT REQUESTS ==========
      window._approveRequest = function(reqId) {
        const req = DB.requests.find(r => r.id === reqId);
        if (!req) return;
        
        try {
          req.status = 'approved';

          switch (req.type) {
            case 'team_registration': {
              const team = DB.teams.find(t => t.id === req.teamId);
              if (!team) throw new Error('تیم پیدا نشد');
              team.manager = req.username;
              if (currentUser && currentUser.username === req.username) {
                currentUser = DB.users.find(u => u.username === req.username);
              }
              addInboxMessage(req.username, '✅ درخواست ثبت نام تیم شما تایید شد!');
              addNews('سیستم', `📋 ${req.username} رسماً به عنوان سرمربی جدید ${team.name} منصوب شد.`, true);
              break;
            }
            case 'sell_player': {
              const player = DB.players.find(p => p.id === req.playerId);
              if (!player) throw new Error('بازیکن پیدا نشد');
              player.forSale = true;
              player.salePrice = req.price;
              addInboxMessage(req.username, `✅ درخواست فروش ${player.name} تایید شد. بازیکن به انتقالات لیگ اضافه شد.`);
              addNews('سیستم', `🏷️ ${player.name} با قیمت ${req.price}M وارد بازار نقل و انتقالات شد.`, true);
              break;
            }
            case 'market_buy': {
              const player = DB.players.find(p => p.id === req.playerId);
              const buyerTeam = DB.teams.find(t => t.id === req.teamId);
              const sellerTeam = DB.teams.find(t => t.id === player?.teamId);
              if (!player || !buyerTeam || !sellerTeam) throw new Error('اطلاعات ناقص');
              
              if (buyerTeam.budget < req.price) throw new Error('بودجه تیم خریدار کافی نیست');
              if (getTeamPlayers(buyerTeam.id).length >= MAX_PLAYERS) throw new Error(`تیم خریدار به حداکثر ${MAX_PLAYERS} بازیکن رسیده`);
              if (getTeamPlayers(sellerTeam.id).length <= MIN_PLAYERS) throw new Error(`تیم فروشنده به حداقل ${MIN_PLAYERS} بازیکن می‌رسد`);

              const isForeign = isForeignPlayer(player.nationality);
              if (isForeign && buyerTeam.foreignQuota <= 0) throw new Error('سهمیه خارجی تیم خریدار پر است');
              if (!isForeign && buyerTeam.localQuota <= 0) throw new Error('سهمیه داخلی تیم خریدار پر است');

              sellerTeam.budget += req.price;
              buyerTeam.budget -= req.price;
              if (!player.isStarter) {
                if (isForeign) { buyerTeam.foreignQuota--; sellerTeam.foreignQuota++; }
                else { buyerTeam.localQuota--; sellerTeam.localQuota++; }
              }
              player.teamId = buyerTeam.id;
              player.forSale = false;
              player.salePrice = null;

              DB.transferHistory.push({
                type: 'buy',
                data: { buyer: buyerTeam.name, seller: sellerTeam.name, player: player.name, price: req.price },
                time: new Date().toLocaleString('fa-IR')
              });
              while (DB.transferHistory.length > MAX_TRANSFER_HISTORY) DB.transferHistory.shift();
              addNews('سیستم', `💣 بمب نقل و انتقالات! ${player.name} با مبلغ ${req.price}M از ${sellerTeam.name} به ${buyerTeam.name} پیوست.`, true);
              addInboxMessage(req.username, `✅ خرید ${player.name} با قیمت ${req.price}M تایید شد.`);
              if (sellerTeam.manager) addInboxMessage(sellerTeam.manager, `💰 فروش ${player.name} به مبلغ ${req.price}M به حساب شما واریز شد.`);
              break;
            }
            case 'trade_offer': {
              const fromTeam = DB.teams.find(t => t.id === req.fromTeamId);
              const toTeam = DB.teams.find(t => t.id === req.targetTeamId);
              const myPlayer = DB.players.find(p => p.id === req.myPlayerId);
              const targetPlayer = DB.players.find(p => p.id === req.targetPlayerId);
              if (!fromTeam || !toTeam || !myPlayer || !targetPlayer || myPlayer.teamId !== fromTeam.id || targetPlayer.teamId !== toTeam.id) throw new Error('اطلاعات معاوضه ناقص');

              const myIsForeign = isForeignPlayer(myPlayer.nationality);
              const targetIsForeign = isForeignPlayer(targetPlayer.nationality);

              // Only adjust quotas for non-starter players
              const fromNewForeign = fromTeam.foreignQuota + (myIsForeign && !myPlayer.isStarter ? 1 : 0) - (targetIsForeign && !targetPlayer.isStarter ? 1 : 0);
              const fromNewLocal = fromTeam.localQuota + (!myIsForeign && !myPlayer.isStarter ? 1 : 0) - (!targetIsForeign && !targetPlayer.isStarter ? 1 : 0);
              const toNewForeign = toTeam.foreignQuota + (targetIsForeign && !targetPlayer.isStarter ? 1 : 0) - (myIsForeign && !myPlayer.isStarter ? 1 : 0);
              const toNewLocal = toTeam.localQuota + (!targetIsForeign && !targetPlayer.isStarter ? 1 : 0) - (!myIsForeign && !myPlayer.isStarter ? 1 : 0);

              if (fromNewForeign < 0 || fromNewLocal < 0) throw new Error('سهمیه تیم مبدا برای معاوضه کافی نیست');
              if (toNewForeign < 0 || toNewLocal < 0) throw new Error('سهمیه تیم مقصد برای معاوضه کافی نیست');
              if (req.cash > 0 && fromTeam.budget < req.cash) throw new Error('بودجه تیم مبدا برای پرداخت نقدی کافی نیست');

              fromTeam.foreignQuota = fromNewForeign;
              fromTeam.localQuota = fromNewLocal;
              toTeam.foreignQuota = toNewForeign;
              toTeam.localQuota = toNewLocal;
              myPlayer.teamId = toTeam.id;
              targetPlayer.teamId = fromTeam.id;
              if (req.cash > 0) { fromTeam.budget -= req.cash; toTeam.budget += req.cash; }

              DB.transferHistory.push({
                type: 'trade',
                data: { from: fromTeam.name, to: toTeam.name, player1: myPlayer.name, player2: targetPlayer.name, cash: req.cash },
                time: new Date().toLocaleString('fa-IR')
              });
              while (DB.transferHistory.length > MAX_TRANSFER_HISTORY) DB.transferHistory.shift();
              addNews('سیستم', `🤝 دست‌بدهٔ بزرگ! ${myPlayer.name} و ${targetPlayer.name} بین ${fromTeam.name} و ${toTeam.name} معاوضه شدند.`, true);
              addInboxMessage(req.fromUser, `✅ معاوضه ${myPlayer.name} با ${targetPlayer.name} تایید شد!`);
              addInboxMessage(req.toUser, `✅ معاوضه ${targetPlayer.name} با ${myPlayer.name} تایید شد!`);
              break;
            }
            case 'final_contract': {
              const neg = DB.negotiations.find(n => n.id === req.negId);
              if (!neg) throw new Error('مذاکره پیدا نشد');
              const team = DB.teams.find(t => t.manager === neg.teamUsername);
              if (!team) throw new Error('تیم پیدا نشد');
              const isForeign = isForeignPlayer(neg.nationality);
              if (isForeign && team.foreignQuota <= 0) throw new Error('سهمیه خارجی کافی نیست');
              if (!isForeign && team.localQuota <= 0) throw new Error('سهمیه داخلی کافی نیست');
              if (team.budget < req.price) throw new Error('بودجه تیم کافی نیست');
              if (getTeamPlayers(team.id).length >= MAX_PLAYERS) throw new Error(`حداکثر ${MAX_PLAYERS} بازیکن مجاز است`);

              team.budget -= req.price;
              if (isForeign) team.foreignQuota--; else team.localQuota--;
              const newPlayer = {
                id: DB.playerIdCounter++,
                name: neg.playerName,
                position: neg.position,
                nationality: neg.nationality,
                teamId: team.id,
                isStarter: false,
                forSale: false,
                salePrice: null
              };
              DB.players.push(newPlayer);
              DB.transferHistory.push({
                type: 'negotiation',
                data: { team: team.name, player: neg.playerName, price: req.price, duration: req.duration },
                time: new Date().toLocaleString('fa-IR')
              });
              while (DB.transferHistory.length > MAX_TRANSFER_HISTORY) DB.transferHistory.shift();
              addNews('سیستم', `✍️ رسمی: ${neg.playerName} با قراردادی ${req.duration} فصله به ارزش ${req.price}M به ${team.name} پیوست.`, true);
              addInboxMessage(neg.teamUsername, `✅ قرارداد ${neg.playerName} نهایی شد!`);
              addInboxMessage(neg.agentUsername, `✅ قرارداد ${neg.playerName} نهایی شد!`);
              neg.status = 'done';
              break;
            }
            default: throw new Error('نوع درخواست ناشناخته');
          }

          saveDB();
          if (currentAdminSub) renderAdminSubPage(currentAdminSub);
          showToast('✅ درخواست تایید شد.');
        } catch (e) {
          console.error(e);
          req.status = 'pending';
          saveDB();
          if (currentAdminSub) renderAdminSubPage(currentAdminSub);
          showToast('❌ خطا: ' + e.message, true);
        }
      };

      window._rejectRequest = function(reqId) {
        const req = DB.requests.find(r => r.id === reqId);
        if (!req) return;
        req.status = 'rejected';
        
        // **FIX:** rollback forSale if sell_player is rejected
        if (req.type === 'sell_player' && req.playerId) {
          const player = DB.players.find(p => p.id === req.playerId);
          if (player) {
            player.forSale = false;
            player.salePrice = null;
          }
        }
        
        if (req.username) addInboxMessage(req.username, '❌ درخواست شما رد شد.');
        if (req.fromUser) addInboxMessage(req.fromUser, '❌ درخواست شما رد شد.');
        if (req.type === 'trade_offer') addInboxMessage(req.toUser, '❌ درخواست معاوضه رد شد.');
        saveDB();
        if (currentAdminSub) renderAdminSubPage(currentAdminSub);
        showToast('❌ درخواست رد شد.');
      };

      // ========== ADMIN ACTION FUNCTIONS ==========
      window._changeUserRole = function(username) {
        const roles = ['user', 'observer', 'agent', 'starter_manager', 'news_admin'];
        const user = DB.users.find(u => u.username === username);
        if (!user || user.role === 'admin') return;
        const idx = roles.indexOf(user.role);
        user.role = roles[(idx + 1) % roles.length];
        saveDB();
        renderAdminSubPage('users');
        showToast('✅ نقش تغییر کرد.');
      };
      window._toggleBan = function(username) {
        const user = DB.users.find(u => u.username === username);
        if (!user || user.role === 'admin') return;
        user.banned = !user.banned;
        saveDB();
        renderAdminSubPage('users');
      };
      window._changeUserPass = function(username) {
        const newPass = prompt('رمز جدید برای ' + username + ':');
        if (!newPass || newPass.length < 3) { showToast('رمز باید حداقل ۳ کاراکتر باشد.', true); return; }
        const user = DB.users.find(u => u.username === username);
        if (user) { user.password = newPass; saveDB(); showToast('✅ رمز تغییر کرد.'); renderAdminSubPage('users'); }
      };
      window._deleteTeam = function(teamId) {
        if (!confirm('آیا از حذف تیم مطمئن هستید؟')) return;
        const team = DB.teams.find(t => t.id === teamId);
        if (team && team.manager) { showToast('این تیم مدیر دارد، ابتدا برکناری کنید.', true); return; }
        DB.teams = DB.teams.filter(t => t.id !== teamId);
        DB.players = DB.players.filter(p => p.teamId !== teamId);
        saveDB();
        renderAdminSubPage('teams');
        showToast('✅ تیم حذف شد.');
      };
      window._removeManager = function(teamId) {
        const team = DB.teams.find(t => t.id === teamId);
        if (team) { team.manager = null; saveDB(); renderAdminSubPage('teams'); showToast('✅ مدیر برکنار شد.'); }
      };
      window._addTeam = function() {
        const name = prompt('نام تیم:');
        if (!name) return;
        const league = prompt('لیگ (پرمیر لیگ / چمپیونشیپ):');
        if (!league) return;
        const budget = league === 'پرمیر لیگ' ? DB.seasonSettings.premierBudget || 500 : DB.seasonSettings.championshipBudget || 300;
        const foreignQuota = league === 'پرمیر لیگ' ? DB.seasonSettings.premierForeign || 8 : DB.seasonSettings.championshipForeign || 6;
        const localQuota = league === 'پرمیر لیگ' ? DB.seasonSettings.premierLocal || 9 : DB.seasonSettings.championshipLocal || 8;
        DB.teams.push({ id: DB.teamIdCounter++, name, league, manager: null, budget, foreignQuota, localQuota });
        saveDB();
        renderAdminSubPage('teams');
        showToast('✅ تیم اضافه شد.');
      };
      window._adjustBudget = function() {
        const teamId = parseInt(document.getElementById('budgetTeam').value);
        const amount = parseInt(document.getElementById('budgetAmount').value);
        if (!amount) { showToast('مبلغ را وارد کنید.', true); return; }
        const team = DB.teams.find(t => t.id === teamId);
        if (team) { team.budget += amount; if (team.budget < 0) team.budget = 0; saveDB(); showToast('✅ بودجه بروز شد.'); renderAdminSubPage('budget'); }
      };
      window._adjustQuota = function() {
        const teamId = parseInt(document.getElementById('quotaTeam').value);
        const type = document.getElementById('quotaType').value;
        const amount = parseInt(document.getElementById('quotaAmount').value);
        if (!amount) { showToast('مقدار را وارد کنید.', true); return; }
        const team = DB.teams.find(t => t.id === teamId);
        if (team) {
          if (type === 'foreign') { team.foreignQuota += amount; if (team.foreignQuota < 0) team.foreignQuota = 0; }
          else { team.localQuota += amount; if (team.localQuota < 0) team.localQuota = 0; }
          saveDB();
          showToast('✅ سهمیه بروز شد.');
          renderAdminSubPage('quota');
        }
      };
      window._removePlayerFromTeam = function(teamId) {
        const team = DB.teams.find(t => t.id === teamId);
        if (!team) return;
        const players = getTeamPlayers(teamId);
        if (players.length === 0) { showToast('این تیم بازیکنی ندارد.', true); return; }
        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modalContent');
        modal.innerHTML = `
          <h3>🗑️ حذف بازیکن از تیم ${escapeHTML(team.name)}</h3>
          <p style="color:#aaa;">با حذف بازیکن، سهمیه آزاد می‌شود.</p>
          <select id="removePlayerSelect" style="margin:10px 0;">
            ${players.map(p => `<option value="${p.id}">${escapeHTML(p.name)} (${escapeHTML(p.position)})</option>`).join('')}
          </select>
          <div id="removePlayerError"></div>
          <button type="button" class="btn-red" onclick="window._submitRemovePlayer(${teamId})">🗑️ حذف بازیکن</button>
          <button type="button" class="btn-dark" onclick="window._closeOverlay()" style="margin-top:8px;">بستن</button>`;
        overlay.classList.remove('hidden');
      };
      window._submitRemovePlayer = function(teamId) {
        const playerId = parseInt(document.getElementById('removePlayerSelect').value);
        const errEl = document.getElementById('removePlayerError');
        if (!playerId) { errEl.innerHTML = '<div class="msg-error">بازیکنی انتخاب نشده</div>'; return; }
        const player = DB.players.find(p => p.id === playerId);
        if (!player || player.teamId !== teamId) return;
        const team = DB.teams.find(t => t.id === teamId);
        if (!team) return;
        // Only free quota if NOT a starter
        if (!player.isStarter) {
          if (isForeignPlayer(player.nationality)) team.foreignQuota++;
          else team.localQuota++;
        }
        DB.players = DB.players.filter(p => p.id !== playerId);
        saveDB();
        window._closeOverlay();
        renderAdminSubPage('teams');
        showToast(`✅ بازیکن ${player.name} از تیم حذف شد و سهمیه آزاد شد.`);
      };
      window._broadcast = function() {
        const text = document.getElementById('broadcastText').value.trim();
        if (!text) { showToast('متن را وارد کنید.', true); return; }
        DB.users.forEach(u => {
          if (u.username !== 'رضا برمودا') addInboxMessage(u.username, '📢 پیام همگانی: ' + text);
        });
        saveDB();
        showToast('✅ پیام همگانی ارسال شد.');
        renderAdminSubPage('broadcast');
      };
      window._budgetAllTeams = function(league, amount) {
        const teams = DB.teams.filter(t => t.league === league);
        teams.forEach(t => {
          t.budget += amount;
          if (t.budget < 0) t.budget = 0;
          if (t.manager) addInboxMessage(t.manager, `💰 بودجه تیم ${t.name} به مبلغ ${amount > 0 ? '+' : ''}${amount}M تغییر یافت.`);
        });
        saveDB();
        showToast(`✅ بودجه تمام تیم‌های ${league} به مبلغ ${amount > 0 ? '+' : ''}${amount}M تغییر یافت.`);
        renderAdminSubPage('budgetAll');
      };
      window._budgetAllTeamsCustom = function() {
        const amount = parseInt(document.getElementById('budgetAllAmount').value);
        const league = document.getElementById('budgetAllLeague').value;
        if (!amount || isNaN(amount)) { showToast('مبلغ معتبر وارد کنید.', true); return; }
        window._budgetAllTeams(league, amount);
      };
      window._quotaAllTeams = function(league, type, amount) {
        const teams = DB.teams.filter(t => t.league === league);
        teams.forEach(t => {
          if (type === 'foreign') { t.foreignQuota += amount; if (t.foreignQuota < 0) t.foreignQuota = 0; }
          else { t.localQuota += amount; if (t.localQuota < 0) t.localQuota = 0; }
          if (t.manager) addInboxMessage(t.manager, `📊 سهمیه ${type==='foreign'?'خارجی':'داخلی'} تیم ${t.name} به مقدار ${amount>0?'+':''}${amount} تغییر یافت.`);
        });
        saveDB();
        showToast(`✅ سهمیه ${type==='foreign'?'خارجی':'داخلی'} تمام تیم‌های ${league} به مقدار ${amount>0?'+':''}${amount} تغییر یافت.`);
        renderAdminSubPage('quotaAll');
      };
      window._quotaAllTeamsCustom = function() {
        const amount = parseInt(document.getElementById('quotaAllAmount').value);
        const league = document.getElementById('quotaAllLeague').value;
        const type = document.getElementById('quotaAllType').value;
        if (!amount || isNaN(amount)) { showToast('مقدار معتبر وارد کنید.', true); return; }
        window._quotaAllTeams(league, type, amount);
      };

      // ========== STARTER MANAGER PANEL ==========
      function renderStarterPanel() {
        const container = document.getElementById('mainContent');
        if (!isStarterManager() && !isAdmin()) { container.innerHTML = '<p class="text-muted">دسترسی محدود</p>'; return; }
        container.innerHTML = `
          <div class="card glass">
            <h2>🎯 مدیریت بازیکنان اولیه</h2>
            <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:12px 0;">
              <select id="starterTeam" style="flex:1;min-width:160px;">${DB.teams.map(t=>`<option value="${t.id}">${escapeHTML(t.name)}</option>`).join('')}</select>
              <input type="text" id="starterName" placeholder="نام" style="flex:1;min-width:110px;">
              <input type="text" id="starterPos" placeholder="پست" style="flex:1;min-width:110px;">
              <select id="starterNat" style="flex:1;min-width:130px;"><option value="برمودا">🇧🇲 برمودا</option><option value="انگلیس">🏴󠁧󠁢󠁥󠁮󠁧󠁿 انگلیس</option><option value="خارجی">🌍 خارجی</option></select>
              <button type="button" class="btn-green btn-sm" onclick="window._addStarter()">➕ افزودن</button>
            </div>
            <h4>📋 لیست بازیکنان اولیه:</h4>
            <div style="max-height:250px;overflow-y:auto;">
              ${DB.players.filter(p => p.isStarter).map(p => `
                <div style="font-size:0.9rem;padding:6px 12px;background:rgba(255,255,255,0.04);border-radius:10px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;">
                  <span>${escapeHTML(p.name)} (${escapeHTML(p.position)}) - تیم: ${escapeHTML(DB.teams.find(t=>t.id===p.teamId)?.name||'?')}</span>
                  <button type="button" class="btn-red btn-xs" onclick="window._deleteStarter(${p.id})">❌</button>
                </div>
              `).join('') || '<p class="text-muted">هیچ بازیکن اولیه‌ای وجود ندارد</p>'}
            </div>
          </div>`;
      }

      window._addStarter = function() {
        const teamId = parseInt(document.getElementById('starterTeam').value);
        const name = document.getElementById('starterName').value.trim();
        const position = document.getElementById('starterPos').value.trim();
        const nationality = document.getElementById('starterNat').value;
        if (!name || !position) { showToast('نام و پست را وارد کنید.', true); return; }
        DB.players.push({
          id: DB.playerIdCounter++,
          name, position, nationality,
          teamId,
          isStarter: true,
          forSale: false,
          salePrice: null
        });
        // STARTERS DO NOT AFFECT QUOTA
        saveDB();
        renderPage('starters');
        showToast('✅ بازیکن اولیه اضافه شد (بدون مصرف سهمیه).');
      };

      window._deleteStarter = function(playerId) {
        if (!confirm('آیا از حذف این بازیکن اولیه مطمئن هستید؟')) return;
        const player = DB.players.find(p => p.id === playerId);
        if (!player || !player.isStarter) return;
        // STARTERS DO NOT FREE QUOTA
        DB.players = DB.players.filter(p => p.id !== playerId);
        saveDB();
        renderPage('starters');
        showToast('✅ بازیکن اولیه حذف شد.');
      };

      // ========== SEASON SETTINGS ==========
      function renderSeasonSettings() {
        const container = document.getElementById('mainContent');
        if (!isAdmin()) { container.innerHTML = '<p class="text-muted">دسترسی محدود</p>'; return; }
        container.innerHTML = `
          <div class="card glass">
            <h2>⚙️ تنظیمات سیزن</h2>
            <div style="display:flex;flex-direction:column;gap:16px;margin-top:12px;">
              <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                <span style="font-size:1.1rem;">🔄 نقل و انتقالات</span>
                <button type="button" class="btn-sm ${DB.seasonSettings.transfersOpen ? 'btn-green' : 'btn-red'}" onclick="window._toggleTransfers()">
                  ${DB.seasonSettings.transfersOpen ? '✅ باز' : '⛔ بسته'}
                </button>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                <span style="font-size:1.1rem;">📝 ثبت نام تیم</span>
                <button type="button" class="btn-sm ${DB.seasonSettings.registrationOpen ? 'btn-green' : 'btn-red'}" onclick="window._toggleRegistration()">
                  ${DB.seasonSettings.registrationOpen ? '✅ باز' : '⛔ بسته'}
                </button>
              </div>
              <hr>
              <h3>💰 تنظیمات بودجه اولیه</h3>
              <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                <label>پرمیر لیگ:</label>
                <input type="number" id="premierBudget" value="${DB.seasonSettings.premierBudget || 500}" style="width:100px;">
                <label>چمپیونشیپ:</label>
                <input type="number" id="championshipBudget" value="${DB.seasonSettings.championshipBudget || 300}" style="width:100px;">
                <button type="button" class="btn-sm btn-green" onclick="window._saveSeasonBudget()">💾 ذخیره</button>
              </div>
              <hr>
              <h3>📊 تنظیمات سهمیه اولیه</h3>
              <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                <label>پرمیر خارجی:</label><input type="number" id="premierForeign" value="${DB.seasonSettings.premierForeign || 8}" style="width:70px;">
                <label>پرمیر داخلی:</label><input type="number" id="premierLocal" value="${DB.seasonSettings.premierLocal || 9}" style="width:70px;">
                <label>چمپیونشیپ خارجی:</label><input type="number" id="championshipForeign" value="${DB.seasonSettings.championshipForeign || 6}" style="width:70px;">
                <label>چمپیونشیپ داخلی:</label><input type="number" id="championshipLocal" value="${DB.seasonSettings.championshipLocal || 8}" style="width:70px;">
                <button type="button" class="btn-sm btn-green" onclick="window._saveSeasonQuota()">💾 ذخیره</button>
              </div>
            </div>
          </div>`;
      }

      window._toggleTransfers = function() {
        DB.seasonSettings.transfersOpen = !DB.seasonSettings.transfersOpen;
        saveDB();
        if (DB.seasonSettings.transfersOpen) addNews('سیستم', '🔥 بازار نقل و انتقالات تابستانی رسماً باز شد!', true);
        else addNews('سیستم', '⛔ پنجره نقل و انتقالات بسته شد. تیم‌ها باید با قدرت فعلی ادامه دهند.', true);
        renderPage('seasonSettings');
      };
      window._toggleRegistration = function() {
        DB.seasonSettings.registrationOpen = !DB.seasonSettings.registrationOpen;
        saveDB();
        if (DB.seasonSettings.registrationOpen) addNews('سیستم', '📝 فراخوان ثبت‌نام سرمربیان جدید در لیگ برمودا آغاز شد.', true);
        else addNews('سیستم', '📝 مهلت ثبت‌نام مربیان جدید به پایان رسید.', true);
        renderPage('seasonSettings');
      };
      window._saveSeasonBudget = function() {
        const pb = parseInt(document.getElementById('premierBudget').value);
        const cb = parseInt(document.getElementById('championshipBudget').value);
        if (!pb || !cb || pb<0 || cb<0) { showToast('مقادیر معتبر وارد کنید.', true); return; }
        DB.seasonSettings.premierBudget = pb;
        DB.seasonSettings.championshipBudget = cb;
        saveDB();
        showToast('✅ ذخیره شد.');
        renderSeasonSettings();
      };
      window._saveSeasonQuota = function() {
        const pf = parseInt(document.getElementById('premierForeign').value);
        const pl = parseInt(document.getElementById('premierLocal').value);
        const cf = parseInt(document.getElementById('championshipForeign').value);
        const cl = parseInt(document.getElementById('championshipLocal').value);
        if (pf<0||pl<0||cf<0||cl<0) { showToast('مقادیر معتبر وارد کنید.', true); return; }
        DB.seasonSettings.premierForeign = pf;
        DB.seasonSettings.premierLocal = pl;
        DB.seasonSettings.championshipForeign = cf;
        DB.seasonSettings.championshipLocal = cl;
        saveDB();
        showToast('✅ ذخیره شد.');
        renderSeasonSettings();
      };

      // ========== SETTINGS PAGE ==========
      function renderSettingsPage() {
        const container = document.getElementById('mainContent');
        container.innerHTML = `
          <div class="card glass">
            <h2>⚙️ منوی تنظیمات برنامه</h2>
            <div style="display:flex;flex-direction:column;gap:16px;margin-top:12px;">
              <div class="glass2" style="padding:18px;border-radius:16px;">
                <h3>🔄 ریست نرم (Soft Reset)</h3>
                <p style="color:#aaa;font-size:0.9rem;">✅ تیم‌ها و بازیکنان باقی می‌مونن، مالکیت تیم‌ها پاک میشه، درخواست‌ها/اخبار/مذاکرات/تاریخچه پاک میشه، بودجه و سهمیه به حالت اول برمیگرده.</p>
                <button type="button" class="btn-red" onclick="window._softReset()" style="margin-top:8px;">🔄 انجام ریست نرم</button>
              </div>
              <div class="glass2" style="padding:18px;border-radius:16px;">
                <h3>💥 ریست کلی (Hard Reset)</h3>
                <p style="color:#aaa;font-size:0.9rem;">❌ همه چیز پاک میشه (تیم‌ها، بازیکنان، اخبار، درخواست‌ها...) اما حساب‌های کاربران و مدیرکل باقی می‌مونن.</p>
                <button type="button" class="btn-red" onclick="window._hardReset()" style="margin-top:8px;">💣 انجام ریست کلی</button>
              </div>
              <div class="glass2" style="padding:18px;border-radius:16px;">
                <h3>🔒 خاموش/روشن کردن برنامه</h3>
                <p style="color:#aaa;font-size:0.9rem;">وضعیت فعلی: ${DB.appOff ? '🔴 خاموش (فقط مدیرکل)' : '🟢 روشن (همه)'}</p>
                <button type="button" class="btn-dark" onclick="window._toggleApp()" style="margin-top:8px;">${DB.appOff ? '🟢 روشن کردن' : '🔴 خاموش کردن'} برنامه</button>
              </div>
              <div class="glass2" style="padding:18px;border-radius:16px;">
                <h3>🔑 تغییر رمز مدیریت</h3>
                <p style="color:#aaa;font-size:0.9rem;">رمز عبور مدیرکل (رضا برمودا) رو تغییر بده.</p>
                <button type="button" class="btn-blue" onclick="window._changeAdminPass()" style="margin-top:8px;">🔑 تغییر رمز</button>
                <div class="glass2" style="padding:18px;border-radius:16px;">
  <h3>💾 بک‌آپ اطلاعات</h3>
  <p style="color:#aaa;font-size:0.9rem;">دانلود یک نسخهٔ پشتیبان کامل از تمام اطلاعات لیگ (کاربران، تیم‌ها، بازیکنان، نقل و انتقالات، اخبار و پیام‌ها).</p>
  <button type="button" class="btn-green" onclick="window._backupData()" style="margin-top:8px;">📥 دانلود فایل بک‌آپ</button>
</div>
              </div>
            </div>
          </div>`;
      }

      window._softReset = function() {
        if (!confirm('🔄 ریست نرم: مالکیت تیم‌ها پاک میشه، درخواست‌ها/چت/مذاکرات/تاریخچه پاک میشه، بودجه و سهمیه به حالت اول برمیگرده. ادامه؟')) return;
        DB.teams.forEach(t => { t.manager = null; });
        DB.teams.forEach(t => {
          const isPremier = t.league === 'پرمیر لیگ';
          t.budget = isPremier ? (DB.seasonSettings.premierBudget || 500) : (DB.seasonSettings.championshipBudget || 300);
          t.foreignQuota = isPremier ? (DB.seasonSettings.premierForeign || 8) : (DB.seasonSettings.championshipForeign || 6);
          t.localQuota = isPremier ? (DB.seasonSettings.premierLocal || 9) : (DB.seasonSettings.championshipLocal || 8);
        });
        DB.requests = [];
        DB.newsPosts = [];
        DB.negotiations = [];
        DB.transferHistory = [];
        DB.inboxMessages = [];
        DB.chatBanned = [];
        DB.chatTempBanned = [];
        saveDB();
        showToast('✅ ریست نرم انجام شد.');
        renderPage('settings');
      };

      window._hardReset = function() {
        if (!confirm('💣 ریست کلی: همه چیز پاک میشه! فقط حساب‌های کاربری باقی می‌مونن. ادامه؟')) return;
        if (!confirm('⚠️ آخرین هشدار! این عمل قابل بازگشت نیست.')) return;
        const users = [...DB.users];
        DB = { ...JSON.parse(JSON.stringify(DEFAULT_DB)), users };
        DB._lastUpdate = Date.now();
        saveDB();
        currentUser = null;
        document.getElementById('topMenu').style.display = 'none';
        renderPage('login');
        showToast('✅ ریست کلی انجام شد.');
      };

      window._toggleApp = function() {
        DB.appOff = !DB.appOff;
        saveDB();
        renderPage('settings');
        showToast(DB.appOff ? '⛔ برنامه خاموش شد.' : '🟢 برنامه روشن شد.');
      };

      window._changeAdminPass = function() {
        const newPass = prompt('🔑 رمز جدید مدیرکل:');
        if (newPass && newPass.length >= 3) {
          const admin = DB.users.find(u => u.username === 'رضا برمودا');
          if (admin) admin.password = newPass;
          saveDB();
          showToast('✅ رمز تغییر کرد.');
        }
      };

      // ========== OVERLAY ==========
      window._backupData = function() {
  try {
    const backup = JSON.stringify(DB, null, 2);
    const overlay = document.getElementById('overlay');
    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
      <h3>💾 بک‌آپ اطلاعات</h3>
      <p style="color:#aaa; margin-bottom:10px;">متن زیر را کپی کرده و در یک فایل JSON ذخیره کنید.</p>
      <textarea id="backupText" style="width:100%; height:300px; font-size:0.8rem; direction:ltr;" readonly>${escapeHTML(backup)}</textarea>
      <button type="button" class="btn-blue btn-sm" onclick="window._copyBackup()" style="margin-top:10px;">📋 کپی کردن</button>
      <button type="button" class="btn-dark btn-sm" onclick="window._closeOverlay()" style="margin-top:10px;">بستن</button>
    `;
    overlay.classList.remove('hidden');
  } catch(e) {
    showToast('❌ خطا: ' + e.message, true);
  }
};

window._copyBackup = function() {
  const textarea = document.getElementById('backupText');
  textarea.select();
  document.execCommand('copy');
  showToast('✅ متن کپی شد. آن را در یک فایل JSON ذخیره کنید.');
};
window._closeOverlay = function() {
        document.getElementById('overlay').classList.add('hidden');
      };
      document.getElementById('overlay').addEventListener('click', function(e) {
        if (e.target === this) window._closeOverlay();
      });

      // ========== MENU ==========
      document.getElementById('topMenu').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  
  // چک اینترنت
  if (!navigator.onLine && btn.id !== 'btnLogout') {
    showToast('⚠️ اینترنت قطع است. لطفاً اینترنت را روشن کنید.', true);
    return;
  }
  
  if (btn.id === 'btnLogout') {
    currentUser = null;
    document.getElementById('topMenu').style.display = 'none';
    renderPage('login');
    return;
  }
  const page = btn.dataset.page;
  if (page) renderPage(page);
});

      // ========== INIT (CRITICAL ORDER) ==========
      async function initApp() {
  loadDB();

  let cloudLoaded = false;
  for (let attempt = 1; attempt <= 5; attempt++) {
    try {
      const { data } = await supabase.from('bermuda_data').select('details').eq('id', 1).single();
      if (data && data.details) {
        const cloudDB = { ...DEFAULT_DB, ...data.details };
        DB = cloudDB;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
        cloudLoaded = true;
        break;
      } else {
        cloudLoaded = true;
        break;
      }
    } catch(e) {
      if (attempt < 5) await new Promise(r => setTimeout(r, 2000));
    }
  }

  if (!cloudLoaded) {
    document.getElementById('mainContent').innerHTML = `
      <div class="card glass" style="text-align:center; padding:50px; margin-top:80px;">
        <h2 style="color:#e05555;">⚠️ خطا در اتصال به سرور</h2>
        <p style="color:#fff; margin-top:20px;">لطفاً اینترنت خود را بررسی کنید.</p>
        <button class="btn-blue" onclick="location.reload()" style="margin-top:20px;">🔄 تلاش دوباره</button>
      </div>`;
    return;
  }

  ensureAdminAndDefaults();
  initialSyncDone = true;

  document.getElementById('topMenu').style.display = 'none';
  renderPage('login');
  startSync();
  subscribeToChanges();
  console.log('🏝️ لیگ مجازی برمودا - نسخه ضد فاجعه');
}
// ========== START THE APP ==========
initApp();

    })();
  </script>
